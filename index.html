<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشهد الذكي</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html,body{height:100%;margin:0}
        *{box-sizing:border-box}
        body{font-family:'Cairo',sans-serif; background-[#08081a]; color:white;}
        .mono{font-family:'Space Mono',monospace}
        .magazine-wrapper{height:100%;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;}
        .page-section{min-height:100vh; display:flex; align-items:center; justify-content:center; padding: 2rem 0;}
        .grid-bg{background-image:linear-gradient(rgba(99,102,241,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.08) 1px,transparent 1px);background-size:40px 40px;}
        .tool-card{background:rgba(15,15,25,0.7);backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,0.15); border-radius: 1.5rem; transition:all 0.4s;}
        .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;padding:10px 24px;border-radius:10px;font-weight:600;display:inline-flex;align-items:center;gap:8px;}
        .btn-ghost{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#c7d2fe;padding:8px 18px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;}
    </style>
</head>
<body class="bg-[#08081a]">

<div class="magazine-wrapper">
    <section class="page-section grid-bg" id="sec-cover">
        <div class="text-center px-6">
            <div class="mono text-xs tracking-[0.3em] text-indigo-400 mb-6 uppercase">العدد الأول — 2026</div>
            <h1 class="text-6xl font-extrabold mb-4 text-white">المشهد الذكي</h1>
            <p class="text-xl text-indigo-200 mb-10">دليلك التفاعلي لأدوات الذكاء الاصطناعي</p>
            <button class="btn-primary" onclick="document.getElementById('toolPages').scrollIntoView({behavior:'smooth'})">ابدأ الاستكشاف</button>
        </div>
    </section>

    <div id="toolPages"></div>
</div>

<script>
const tools = [
  {
    id:"runway",num:"02",name:"Runway Gen-3",tagline:"توليد الفيديو من النص والصور",icon:"video",color:"#6366f1",
    desc:"نموذج ذكاء اصطناعي متطور يولد مقاطع فيديو عالية الجودة. في هذا النموذج، قمنا بتحويل صورة ثابتة لمترو الرياض إلى لقطة سينمائية متحركة.",
    features:["تحريك الصور بدقة عالية","توليد فيديو من النص","أدوات فرشاة الحركة","تحسين الجودة لـ 4K"],
    advantages:["توفير تكاليف التصوير الجوي","سرعة الإنتاج","محتوى حصري"],
    customDemo: `
      <div class="mt-8 grid md:grid-cols-2 gap-6 items-center">
          <div class="tool-card p-4 text-center">
              <p class="text-[10px] mono text-indigo-400 mb-3 uppercase">المدخلات: صورة ثابتة</p>
              <img src="riyadh-metro-photo.jpg" class="rounded-lg w-full aspect-video object-cover">
          </div>
          <div class="tool-card p-4 text-center border-indigo-500/40">
              <p class="text-[10px] mono text-indigo-400 mb-3 uppercase">المخرجات: فيديو ذكي</p>
              <video controls class="w-full aspect-video bg-black rounded-lg">
                  <source src="metro-kafd.mp4" type="video/mp4">
              </video>
          </div>
      </div>`,
    useCase:{title:"إنتاج لقطات جوية حصرية",text:"تحويل صورة فوتوغرافية لمترو الرياض إلى فيديو سينمائي احترافي."},
    link:"https://runwayml.com",
    videoUrl:"https://www.youtube.com/watch?v=GomY9BHqQ7w"
  },
  {
    id:"elevenlabs",num:"04",name:"ElevenLabs",tagline:"توليف الصوت بالذكاء الاصطناعي",icon:"mic",color:"#a78bfa",
    desc:"توفر ElevenLabs أكثر الأصوات المُولَّدة بالذكاء الاصطناعي واقعية.",
    features:["تحويل نص لكلام","استنساخ الصوت","دعم اللغة العربية"],
    advantages:["واقعية بشرية","دبلجة فورية","بدون استوديو"],
    customDemo: `
      <div class="mt-6 p-4 tool-card bg-indigo-500/5">
          <p class="text-[10px] mono text-indigo-400 mb-2 uppercase text-center">تجربة صوتية</p>
          <audio controls class="w-full"><source src="voice.mp3" type="audio/mpeg"></audio>
      </div>`,
    useCase:{title:"تعليق صوتي للمجلة",text:"استخدام الذكاء الاصطناعي لإنتاج تعليق صوتي احترافي بالعربية."},
    link:"https://elevenlabs.io",
    videoUrl:"https://www.youtube.com/watch?v=GomY9BHqQ7w"
  }
];

function renderTools() {
    const container = document.getElementById('toolPages');
    container.innerHTML = tools.map(tool => `
        <section class="page-section px-6 border-t border-white/5">
            <div class="max-w-5xl mx-auto w-full">
                <div class="mb-8">
                    <h2 class="text-4xl font-bold text-white mb-2">${tool.name}</h2>
                    <p class="text-indigo-300">${tool.tagline}</p>
                </div>
                <div class="grid lg:grid-cols-2 gap-8">
                    <div>
                        <p class="text-indigo-100/80 mb-6">${tool.desc}</p>
                        ${tool.customDemo || ''}
                    </div>
                    <div class="tool-card p-6 border-2" style="border-color:${tool.color}30">
                        <h3 class="text-xl font-bold mb-4">حالة استخدام</h3>
                        <p class="text-indigo-100/70">${tool.useCase.text}</p>
                    </div>
                </div>
            </div>
        </section>
    `).join('');
    lucide.createIcons();
}

window.onload = renderTools;
</script>
</body>
</html>
